<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Equipment Admin — TPevents</title>
  <script src="https://cdn.apple-cloudkit.com/ck/2/cloudkit.js"></script>
  <style>
    body{font-family:Inter,Helvetica,Arial,sans-serif;background:#f7f8fb;margin:20px}
    .wrap{max-width:900px;margin:0 auto}
    .card{background:#fff;padding:14px;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:14px}
    h1{margin:0 0 12px}
    label{display:block;margin:8px 0 4px;font-size:13px}
    input,textarea,select{width:100%;padding:8px;border:1px solid #e3e6ea;border-radius:4px;font-size:14px}
    button{background:#0b5fff;color:#fff;border:0;padding:8px 12px;border-radius:5px;cursor:pointer}
    .row{display:flex;gap:12px}
    .col{flex:1}
    table{width:100%;border-collapse:collapse;margin-top:10px}
    th,td{padding:8px;border-bottom:1px solid #f0f0f0;text-align:left}
    .muted{margin-left:10px;color:#666;font-size:13px}
    #connStatus{margin-bottom:10px;font-size:13px}
    #connStatus.ok{color:#008000}
    #connStatus.err{color:#b00020}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Equipment Admin</h1>

    <div id="connStatus" class="muted">Checking CloudKit connection…</div>

    <!-- Create Equipment (maps to record type Equipment) -->
    <form id="createEquipForm" class="card">
      <h3>Adaugă echipament (RECORD TYPE: Equipment)</h3>
      <div class="row">
        <div class="col">
          <label>Nume (Nume)</label>
          <input id="eq_nume" required />
        </div>
        <div class="col">
          <label>Id (Id – identificator intern)</label>
          <input id="eq_id" required />
        </div>
      </div>
      <div class="row">
        <div class="col">
          <label>Cantitate (Cantitate)</label>
          <input id="eq_cantitate" type="number" min="0" value="0" />
        </div>
        <div class="col">
          <label>Greutate (Greutate, kg)</label>
          <input id="eq_greutate" type="number" step="any" />
        </div>
      </div>
      <div class="row">
        <div class="col">
          <label>Volum (Volum, m³)</label>
          <input id="eq_volum" type="number" step="any" />
        </div>
      </div>
      <button type="submit">Salvează echipament</button>
    </form>

    <!-- List Equipment -->
    <div class="card">
      <h3>Lista echipament (Equipment)</h3>
      <button id="refreshBtn" type="button">Reîncarcă lista</button>
      <table id="equipTable">
        <thead>
          <tr>
            <th>Nume</th>
            <th>Id</th>
            <th>Cantitate</th>
            <th>Greutate</th>
            <th>Volum</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

<script>
/* CLOUDKIT CONFIG: using API Access token string via apiTokenAuth.apiToken */
CloudKit.configure({
  containers: [{
    containerIdentifier: 'iCloud.com.TPevents.inventory',
    apiTokenAuth: {
      apiToken: '8b5f292d85a49134272e27c90b5ba7921dcebed86d915e99e1a467ebe7ec7e87',
      persist: true
    },
    environment: 'development'
  }]
});

const container = CloudKit.getDefaultContainer();
const db = container.publicCloudDatabase;

/* UI refs */
const connStatus = document.getElementById('connStatus');
const createEquipForm = document.getElementById('createEquipForm');
const equipTableBody = document.querySelector('#equipTable tbody');
const refreshBtn = document.getElementById('refreshBtn');

/* CONNECTION TEST: query Equipment (uses Id as queryable index) */
async function testConnection() {
  try {
    const result = await db.performQuery({
      recordType: 'Equipment',
      resultsLimit: 1
    });
    connStatus.textContent = 'CloudKit connection OK.';
    connStatus.classList.remove('err');
    connStatus.classList.add('ok');
    console.log('CloudKit test result:', result);
  } catch (e) {
    connStatus.textContent = 'CloudKit connection FAILED: ' + e;
    connStatus.classList.remove('ok');
    connStatus.classList.add('err');
    console.error('CloudKit connection error:', e);
  }
}

/* SAVE HELPER: create one Equipment record */
async function createRecord(recordType, fields){
  const res = await db.saveRecords({
    records: [{ recordType, fields }]
  });
  if (res.records && res.records.length) return res.records[0];
  throw new Error('Create failed');
}

/* CREATE Equipment (fields: Cantitate, Greutate, Id, Nume, Volum) */
createEquipForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  try {
    const nume = document.getElementById('eq_nume').value || '';
    const id   = document.getElementById('eq_id').value || '';
    const cant = parseInt(document.getElementById('eq_cantitate').value || '0', 10);
    const gre  = parseFloat(document.getElementById('eq_greutate').value) || 0;
    const vol  = parseFloat(document.getElementById('eq_volum').value) || 0;

    const fields = {
      Nume: nume,
      Id: id,                 // STRING QUERYABLE in your schema
      Cantitate: cant,        // INT64
      Greutate: gre,          // DOUBLE
      Volum: vol              // DOUBLE
      // CloudKit will fill ___createTime etc.
    };

    const created = await createRecord('Equipment', fields);
    alert('Creat echipament: ' + (created.recordName || '(fără recordName)'));
    loadEquipmentList();
    createEquipForm.reset();
  } catch (err){
    alert('Eroare la creare: ' + err);
  }
});

/* LOAD Equipment list */
async function loadEquipmentList(){
  try {
    equipTableBody.innerHTML = '';

    const resp = await db.performQuery({
      recordType: 'Equipment',
      resultsLimit: 200
    });

    const records = resp.records || [];
    records.forEach(r=>{
      const f = r.fields || {};
      const nume = f.Nume ?? '';
      const id   = f.Id ?? '';
      const cant = f.Cantitate ?? '';
      const gre  = f.Greutate ?? '';
      const vol  = f.Volum ?? '';

      const tr = document.createElement('tr');
      tr.innerHTML =
        `<td>${escapeHtml(nume)}</td>`+
        `<td>${escapeHtml(id)}</td>`+
        `<td>${escapeHtml(cant)}</td>`+
        `<td>${escapeHtml(gre)}</td>`+
        `<td>${escapeHtml(vol)}</td>`;
      equipTableBody.appendChild(tr);
    });
  } catch (err){
    console.error(err);
    alert('Eroare la încărcarea listei: ' + err);
  }
}

function escapeHtml(s){
  return (''+s).replace(/[&<>"']/g, c=>({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

refreshBtn.addEventListener('click', loadEquipmentList);

/* INIT */
testConnection();
loadEquipmentList();
</script>
</body>
</html>
